---
jobs:
- name: loop
  plan:
  - task: loop
    config:
      platform: linux
      image_resource:
        type: registry-image
        source:
          repository: busybox
      run:
        path: sh
        args:
          - -c
          - |
            echo "Executing on worker: `hostname`"
            for i in `seq 1 30`; do sleep 1; echo "Slept for ${i} seconds."; done
